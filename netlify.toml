[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev -- --port 5190"
  targetPort = 5190
  port = 8889

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/news"
  to = "/.netlify/functions/news"
  status = 200

[[redirects]]
  from = "/api/article"
  to = "/.netlify/functions/article"
  status = 200

[[redirects]]
  from = "/api/compare"
  to = "/.netlify/functions/compare"
  status = 200

[[redirects]]
  from = "/api/summary"
  to = "/.netlify/functions/summary"
  status = 200

[[redirects]]
  from = "/api/scores"
  to = "/.netlify/functions/scores"
  status = 200

[[redirects]]
  from = "/api/debug"
  to = "/.netlify/functions/debug"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
